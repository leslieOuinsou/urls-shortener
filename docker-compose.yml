services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: leslie
      POSTGRES_PASSWORD: leslie
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leslie -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5


  db-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: leslie
      POSTGRES_PASSWORD: leslie
      POSTGRES_DB: mydatabase_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leslie -d mydatabase_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./next-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://leslie:leslie@db:5432/mydatabase
      AUTH_SECRET: "ecfd5dc46e627a47138a4b73c23a7f4e"
      AUTH_TRUST_HOST: "true"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  db_data: